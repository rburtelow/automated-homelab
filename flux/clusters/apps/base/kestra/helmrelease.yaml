apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kestra
  namespace: kestra
spec:
  interval: 10m0s
  timeout: 15m0s
  install:
    timeout: 15m0s
  chart:
    spec:
      chart: kestra-starter
      version: '>=0.0.0'
      sourceRef:
        kind: HelmRepository
        name: kestra
        namespace: kestra
      interval: 10m0s
  values:
    kestra:
      common:
        extraEnvFrom:
          - secretRef:
              name: kestra-env
      configurations:
        application:
          kestra:
            secret:
              type: env-var
