apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
  namespace: n8n
spec:
  interval: 10m0s
  timeout: 15m0s
  install:
    timeout: 15m0s
  chart:
    spec:
      chart: n8n
      version: ">=1.0.0"
      sourceRef:
        kind: HelmRepository
        name: n8n
        namespace: n8n
      interval: 10m0s
  valuesFrom:
    - kind: Secret
      name: n8n-env
      valuesKey: values.yaml
      optional: false
  values:
    main:
      count: 1
      env:
        - name: GENERIC_TIMEZONE
          value: "America/Chicago"
        - name: TZ
          value: "America/Chicago"
      persistence:
        enabled: true
        existingClaim: n8n-main-persistence
        size: 5Gi
        accessMode: ReadWriteOnce
    service:
      type: ClusterIP
      port: 5678
    # Disable bundled postgres - we use the existing CNPG cluster
    postgresql:
      enabled: false
      # Setting auth.username causes the chart to use the 'password' key
      # in existingSecret (vs 'postgres-password'), matching our CNPG secret
      auth:
        username: "n8n"
    db:
      type: postgresdb
    externalPostgresql:
      host: "n8n-postgres-rw"
      port: 5432
      database: n8n
      username: n8n
      # CNPG creates this secret via postgres-secret.yaml (kubernetes.io/basic-auth)
      existingSecret: "n8n-postgres-user"
