apiVersion: v1
kind: Service
metadata:
  name: supabase-studio-tailscale
  namespace: supabase
  annotations:
    tailscale.com/hostname: supabase-studio
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app.kubernetes.io/name: studio
  ports:
  - name: studio
    port: 443
    targetPort: 3000
    protocol: TCP
