apiVersion: v1
kind: Service
metadata:
  name: supabase-db-tailscale
  namespace: supabase
  annotations:
    tailscale.com/expose: "true"
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app.kubernetes.io/name: db
    app.kubernetes.io/instance: supabase
  ports:
    - name: https-db
      port: 443
      targetPort: 5432
      protocol: TCP