apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homepage-ingress
  namespace: homepage
  annotations:
    tailscale.com/hostname: homepage
spec:
  ingressClassName: tailscale
  rules:
    - host: homepage
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homepage
                port:
                  number: 3000
  tls:
    - secretName: "homepage-ingress"
      hosts:
        - homepage