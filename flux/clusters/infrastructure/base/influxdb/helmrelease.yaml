apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: influxdb2
  namespace: influxdb
spec:
  interval: 10m0s
  timeout: 10m
  chart:
    spec:
      chart: influxdb2
      version: '>=0.0.0'
      sourceRef:
        kind: HelmRepository
        name: influxdata
        namespace: influxdb
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    adminUser:
      organization: homelab
      bucket: proxmox
      existingSecret: influxdb-secret
    persistence:
      enabled: true
      storageClass: longhorn
      size: 20Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    service:
      type: ClusterIP
      port: 8086
