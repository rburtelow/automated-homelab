apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 10m0s
  timeout: 15m0s
  install:
    timeout: 15m0s
  chart:
    spec:
      chart: authentik
      version: '>=0.0.0'
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: authentik
      interval: 10m0s
  valuesFrom:
  - kind: Secret
    name: authentik-secret
    valuesKey: secret_key
    targetPath: authentik.secret_key
  - kind: Secret
    name: authentik-secret
    valuesKey: postgres_password
    targetPath: authentik.postgresql.password
  - kind: Secret
    name: authentik-secret
    valuesKey: auth_password
    targetPath: postgresql.auth.password

  values:
    authentik:
      postgresql:
        auth: {}
    server:
      ingress:
        enabled: false
    postgresql:
      enabled: true
      auth: {}
    redis:
      enabled: true
    worker:
      env:
        - name: TMPDIR
          value: /tmp