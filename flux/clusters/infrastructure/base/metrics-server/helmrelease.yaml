apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: kube-system
spec:
  interval: 10m0s
  chart:
    spec:
      chart: metrics-server
      version: '>=3.12.0'
      sourceRef:
        kind: HelmRepository
        name: metrics-server
        namespace: kube-system
      interval: 10m0s
  values:
    args:
      - --kubelet-insecure-tls
      - --kubelet-preferred-address-types=InternalIP,ExternalIP,Hostname

