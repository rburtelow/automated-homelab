apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale
  namespace: tailscale
spec:
  interval: 10m0s
  chart:
    spec:
      chart: tailscale-operator
      version: '>=0.0.0'
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: tailscale
      interval: 10m0s
  valuesFrom:
  - kind: Secret
    name: tailscale-oauth
    valuesKey: client_id
    targetPath: oauth.clientId
  - kind: Secret
    name: tailscale-oauth
    valuesKey: client_secret
    targetPath: oauth.clientSecret
  values:
    operatorConfig: {}