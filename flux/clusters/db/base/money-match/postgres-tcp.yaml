apiVersion: v1
kind: Service
metadata:
  name: money-match-tailscale
  namespace: money-match
  annotations:
    tailscale.com/hostname: money-match-tcp
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    cnpg.io/cluster: money-match
    role: primary
  ports:
  - name: money-match-tcp
    port: 443
    targetPort: 5432
    protocol: TCP
