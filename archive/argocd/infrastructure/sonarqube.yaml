apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infrastructure-sonarqube
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://SonarSource.github.io/helm-chart-sonarqube
    chart: sonarqube
    targetRevision: '>=2025.0.0'
    helm:
      values: |
        community:
          enabled: true
        sonarqube:
          postgresql:
            auth: {}
          sonarProperties:
            sonar.auth.saml.enabled: "true"
            sonar.auth.saml.providerName: "Authentik"
            sonar.auth.saml.user.login: "login"
            sonar.auth.saml.user.name: "name"
            sonar.auth.saml.user.email: "email"
            # Optional: Enable group synchronization
            # sonar.auth.saml.group.name: "groups"
            # Allow users to sign up
            sonar.auth.saml.allowUsersToSignUp: "true"
        # Note: Secrets need to be managed separately or via ArgoCD parameters
        # The following values should be provided via secrets:
        # - monitoringPasscode (from sonarqube-secret.monitoringPasscode)
        # - sonarqube.sonarProperties.sonar.auth.saml.applicationId (from sonarqube-secret.saml.applicationId)
        # - sonarqube.sonarProperties.sonar.auth.saml.loginUrl (from sonarqube-secret.saml.loginUrl)
        # - sonarqube.sonarProperties.sonar.auth.saml.providerId (from sonarqube-secret.saml.providerId)
        # - sonarqube.sonarProperties.sonar.auth.saml.certificate.secured (from sonarqube-secret.saml.certificate)
  destination:
    server: https://kubernetes.default.svc
    namespace: sonarqube
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

