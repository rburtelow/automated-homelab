apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infrastructure-tailscale
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://pkgs.tailscale.com/helmcharts
    chart: tailscale-operator
    targetRevision: '>=1.0.0'
    helm:
      values: |
        operatorConfig: {}
        # Note: Secrets need to be managed separately or via ArgoCD parameters
        # The following values should be provided via secrets:
        # - oauth.clientId (from tailscale-oauth.client_id)
        # - oauth.clientSecret (from tailscale-oauth.client_secret)
  destination:
    server: https://kubernetes.default.svc
    namespace: tailscale
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

