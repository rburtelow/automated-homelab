apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infrastructure-authentik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://charts.goauthentik.io
    chart: authentik
    targetRevision: '>=2025.0.0'
    helm:
      values: |
        authentik:
          postgresql:
            auth: {}
        server:
          ingress:
            enabled: false
        postgresql:
          enabled: true
          auth: {}
        redis:
          enabled: true
        worker:
          env:
            - name: TMPDIR
              value: /tmp
        # Note: Secrets need to be managed separately or via ArgoCD parameters
        # The following values should be provided via secrets:
        # - authentik.secret_key (from authentik-secret.secret_key)
        # - authentik.postgresql.password (from authentik-secret.postgres_password)
        # - postgresql.auth.password (from authentik-secret.auth_password)
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

