apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mongodb-running-race-tracker
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/rburtelow/automation-homelab.git
    targetRevision: main
    path: ./flux/clusters/apps/base/running-race-tracker/mongodb
  destination:
    server: https://kubernetes.default.svc
    namespace: race-tracker
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

